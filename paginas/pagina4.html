<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pagina4</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing:border-box;
        }
        html{
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            height: 95vh;
            width: 80vw;
            background-color: white;
        }
        header {
            height: 20%;
            background-color: purple;
            border-radius: 15px;
            border-bottom:3px solid white ;
            text-align: center;
            color: green;
            font-size: 20px;
            font-weight: bold;
        }

        footer {
            height: 15%;
            background-color: darkgreen;
            border-radius: 15px;
        }
        nav{
            height: 10%;
            background-color: teal;
            border-radius: 15px;
            border: 3px solid white;
        }
        main {
            height: 55%;
        }

        section {
            background-color: skyblue;
            width: 70%;
            height: 100%;
            float: left;
            border-radius: 15px;
            border: 3px solid white;
        }

        article {
            background-color: red;
            width: 97%;
            height: 18%;
            border-radius: 15px;
            display: block;
            padding: 10px;
            color: white;
            font-weight: bold;
            font-size: 12px;
            margin: 2px;
            margin-left: 19px;
        }
        article:nth-of-type(1){
            margin-top:5px ;
        }

        aside {
            background-color: wheat;
            width: 30%;
            height: 100%;
            float: right;
            border-radius: 15px;
            border: 3px solid white;
        }
    </style>
</head>
<body>
    <!-- ENCABEZADO -->
    <header> 
        Ejemplo Maquetacion
    </header>

    <!-- MENU -->
    <nav>

    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        
        <!-- barra lateral -->
        <ASide>

        </ASide>

        <!-- seccion -->
         <section>
            
            <!-- articulo 1 -->
            <article> articulo 1</article>
            <!-- articulo 2 -->
            <article> articulo 2</article>
            <!-- articulo 3 --> 
            <article> articulo 3</article>
            <!-- articulo 4 -->
            <article> articulo 4</article>
            <!-- articulo 5 -->
            <article> articulo 5</article>


         </section>
    </main>

    <!-- PIE DE PAGINA -->
     <footer>

     </footer>


</body>
</html>
