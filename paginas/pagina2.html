<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    * {
        box-sizing: border-box;
    }
    nav {
        background-color: lightpink;
        height: 50px;
        color: white

    }
    div {
        box-sizing: border-box;
        position: relative;
        top: 15px;
        padding: 4px;
        display: inline;
        margin: 3px;
    }
    div:hover{
        background-color: blue ;
    }

</style>
</head>
<body>
    <nav> 
        <div> inicio </div>
        <div> ¿quienes somos? </div>
        <div> Contacto </div>
    </nav>
</body>
</html>
